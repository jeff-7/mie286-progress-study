<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIE286 Study - Direction Matching Game</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --muted: #94a3b8;
      --text: #e5e7eb;
      --accent: #38bdf8;
      --accent2: #22c55e;
      --accent2-soft: #86efac;
      --border: #1f2937;
      --warn: #fbbf24;
      --ok: #86efac;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      margin: 0;
      font-family: Inter, Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #0b1220 0%, #111827 100%);
      color: var(--text);
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: stretch;
      padding: 12px;
    }
    .app {
      width: min(100vw - 24px, 1700px);
      height: calc(100vh - 24px);
      background: rgba(17, 24, 39, 0.97);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 22px 26px 26px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      overflow: hidden;
    }
    h1, h2, h3, p { margin-top: 0; }
    h1 { font-size: 2.2rem; margin-bottom: 8px; }
    h2 { font-size: 2rem; margin-bottom: 12px; }
    .muted { color: var(--muted); }
    .card {
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      background: rgba(255,255,255,0.02);
      margin-top: 16px;
    }
    .confetti-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 40;
    }
    .confetti-piece {
      position: absolute;
      width: 10px;
      height: 16px;
      top: 14%;
      border-radius: 3px;
      opacity: 0.95;
      animation: confettiDrop 1200ms cubic-bezier(0.18, 0.72, 0.3, 1) forwards;
      will-change: transform, opacity;
    }
    @keyframes confettiDrop {
      0% {
        transform: translate3d(0, -12px, 0) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      100% {
        transform: translate3d(var(--drift-x, 0px), var(--drop-y, 220px), 0) rotate(var(--spin, 360deg));
        opacity: 0;
      }
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(220px, 1fr));
      gap: 14px;
      margin: 0;
    }
    .stat {
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      background: rgba(255,255,255,0.03);
      min-height: 108px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .stat-label { color: var(--muted); font-size: 1rem; }
    .stat-value { font-size: 2.1rem; font-weight: 800; margin-top: 6px; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .language-switch { margin-left: auto; }
    .card ul { line-height: 1.6; }
    button {
      appearance: none;
      border: none;
      background: linear-gradient(90deg, var(--accent), #60a5fa);
      color: #08111f;
      font-weight: 700;
      padding: 12px 18px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1rem;
    }
    button.secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }
    button.ghost {
      background: rgba(255,255,255,0.04);
      color: var(--text);
      border: 1px solid var(--border);
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    input[type="text"] {
      width: 280px;
      max-width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      font-size: 1rem;
    }
    .main-layout {
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 0;
      height: calc(100vh - 180px);
    }
    .fullscreen-flow {
      min-height: 0;
      height: calc(100vh - 120px);
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }
    .intro-panel {
      max-height: calc(100vh - 168px);
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      padding-right: 8px;
    }
    .transition-screen {
      min-height: 0;
      height: calc(100vh - 160px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 0 0;
    }
    .transition-panel {
      width: 100%;
      min-height: min(72vh, 760px);
      border: 1px solid var(--border);
      border-radius: 26px;
      background: linear-gradient(180deg, rgba(255,255,255,0.035) 0%, rgba(255,255,255,0.02) 100%);
      padding: clamp(28px, 4vw, 56px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 28px;
      box-shadow: 0 18px 48px rgba(0,0,0,0.24);
    }
    .transition-copy {
      max-width: 1100px;
    }
    .transition-kicker {
      color: var(--muted);
      font-size: 1.05rem;
      margin-bottom: 10px;
    }
    .transition-title {
      font-size: clamp(2.4rem, 5vw, 4.6rem);
      line-height: 1.06;
      font-weight: 900;
      letter-spacing: -0.03em;
      margin: 0;
    }
    .transition-lead {
      font-size: clamp(1.05rem, 1.8vw, 1.35rem);
      color: #dbe4f0;
      margin: 0;
      line-height: 1.65;
      max-width: 920px;
    }
    .transition-info {
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 22px;
      background: rgba(255,255,255,0.035);
      padding: clamp(20px, 2.4vw, 30px);
      max-width: 1120px;
    }
    .transition-info p {
      margin: 0;
      font-size: clamp(1rem, 1.5vw, 1.25rem);
      line-height: 1.7;
    }
    .transition-actions {
      display: flex;
      justify-content: flex-start;
      align-items: center;
      gap: 14px;
      margin-top: 4px;
    }
    .transition-actions button {
      min-width: 220px;
      min-height: 68px;
      font-size: 1.25rem;
      border-radius: 18px;
    }
    .feedback-panel {
      width: 100%;
      border: 1px solid rgba(56, 189, 248, 0.32);
      border-radius: 20px;
      padding: 20px 24px;
      background: rgba(255,255,255,0.03);
      box-shadow: 0 10px 28px rgba(0,0,0,0.16);
      min-height: 120px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .feedback-label {
      color: #dbeafe;
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .completed-big {
      font-size: min(6vw, 4rem);
      line-height: 1.1;
      font-weight: 900;
      color: #f8fafc;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
    }
    .completed-answer-top {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin: 10px auto 6px;
      min-height: 112px;
      width: 100%;
      text-align: center;
    }
    .completed-answer-top .done-number {
      font-size: min(10vw, 5.6rem);
      line-height: 0.95;
      font-weight: 900;
      color: var(--accent2-soft);
      text-shadow: 0 0 18px rgba(34, 197, 94, 0.18);
    }
    .completed-answer-top .total-number {
      font-size: min(2.8vw, 1.35rem);
      line-height: 1.1;
      font-weight: 700;
      color: var(--muted);
      text-align: center;
    }
    .progress-shell {
      width: 100%;
      height: 48px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.05);
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent2), var(--accent2-soft));
      transition: width 0.08s linear, background 0.12s linear;
    }
    .bar-timer {
      margin-top: 10px;
      font-size: 1.9rem;
      font-weight: 900;
      letter-spacing: 0.04em;
    }
    .stimulus-inner {
      width: 100%;
      min-height: inherit;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 22px 24px 30px;
    }
    .trial-counter {
      position: absolute;
      top: 22px;
      left: 24px;
      right: 24px;
      text-align: center;
      color: #dbe4f0;
      font-size: 1.45rem;
      font-weight: 800;
      letter-spacing: 0.02em;
    }
    .stimulus-track {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(14px, 2vw, 26px);
      width: 100%;
      padding-top: 42px;
    }
    .current-arrow-wrap {
      width: min(28vw, 16rem);
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }
    .stage-progress-wrap {
      margin-top: 6px;
    }
    .stage-progress-track {
      display: flex;
      gap: 8px;
      width: 100%;
      align-items: stretch;
    }
    .stage-progress-segment {
      position: relative;
      height: 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(148, 163, 184, 0.18);
      overflow: visible;
    }
    .stage-progress-fill {
      position: absolute;
      inset: 0 auto 0 0;
      width: 0%;
      border-radius: inherit;
      transition: width 0.08s linear;
    }
    .stage-progress-flag {
      position: absolute;
      left: 0%;
      top: 50%;
      width: 18px;
      height: 28px;
      transform: translate(-50%, -56%);
      pointer-events: none;
      z-index: 2;
      transition: left 0.08s linear;
    }
    .stage-progress-flag::before {
      content: '';
      position: absolute;
      left: 3px;
      top: 1px;
      width: 2px;
      height: 24px;
      border-radius: 999px;
      background: rgba(248, 250, 252, 0.95);
      box-shadow: 0 0 0 1px rgba(15, 23, 42, 0.18);
    }
    .stage-progress-flag::after {
      content: '';
      position: absolute;
      left: 5px;
      top: 2px;
      width: 10px;
      height: 8px;
      background: linear-gradient(180deg, #fb7185, #dc2626);
      clip-path: polygon(0 0, 100% 18%, 72% 50%, 100% 82%, 0 100%);
      box-shadow: 0 1px 4px rgba(220, 38, 38, 0.35);
      border-radius: 1px;
    }
    .stage-progress-fill.practice { background: linear-gradient(90deg, #22c55e, #4ade80); }
    .stage-progress-fill.block0 { background: linear-gradient(90deg, #22c55e, #86efac); }
    .stage-progress-fill.block1 { background: linear-gradient(90deg, #38bdf8, #60a5fa); }
    .stage-progress-labels {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.96rem;
      font-weight: 600;
      text-align: center;
    }
    .stage-progress-label {
      min-width: 0;
    }
    .arrow.thick-arrow {
      font-weight: 900;
      text-shadow: 1.1px 0 0 currentColor, -1.1px 0 0 currentColor, 0 1.1px 0 currentColor, 0 -1.1px 0 currentColor;
    }
    .preview-arrows {
      display: flex;
      gap: 12px;
      justify-content: center;
      align-items: center;
    }
    .preview-arrow-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      opacity: 0.5;
      width: min(9vw, 4.5rem);
      flex: 0 0 auto;
    }
    .preview-arrow-item .arrow {
      font-size: min(8vw, 3.5rem);
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .preview-arrow-item .preview-label {
      font-size: 0.7rem;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .stimulus {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      flex: 1 1 auto;
      width: min(100%, 980px);
      max-height: min(42vh, 460px);
      min-height: 0;
      border: 1px dashed #334155;
      border-radius: 24px;
      background: rgba(255,255,255,0.02);
      margin: 0 auto;
      overflow: hidden;
    }
    .arrow {
      font-size: min(18vw, 10rem);
      line-height: 1;
      user-select: none;
    }
    .success { color: var(--ok); }
    .warning { color: var(--warn); }
    .upload-emphasis { color: #ff5a5a; font-weight: 900; letter-spacing: 0.01em; text-transform: uppercase; }
    .leaderboard-panel {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .leaderboard-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 4px;
    }
    .leaderboard-table th,
    .leaderboard-table td {
      border-bottom: 1px solid var(--border);
      padding: 12px 8px;
      text-align: left;
      font-size: 0.95rem;
      vertical-align: middle;
    }
    .leaderboard-table th { color: var(--muted); font-weight: 600; }
    .leaderboard-table tr.current-row {
      background: rgba(56, 189, 248, 0.08);
    }
    .leaderboard-rank-cell {
      width: 82px;
      white-space: nowrap;
      font-weight: 800;
    }
    .rank-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 800;
    }
    .crown { font-size: 1rem; }
    .crown.gold { color: #fbbf24; }
    .crown.silver { color: #cbd5e1; }
    .crown.bronze { color: #d97706; }
    .leaderboard-self-tag {
      display: inline-block;
      margin-left: 6px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 700;
      color: #dbeafe;
      background: rgba(56, 189, 248, 0.14);
      border: 1px solid rgba(56, 189, 248, 0.24);
    }
    .leaderboard-ellipsis td {
      text-align: center;
      color: var(--muted);
      font-weight: 800;
      letter-spacing: 0.22em;
    }
    .leaderboard-rule {
      color: #cbd5e1;
      font-size: 0.94rem;
      line-height: 1.6;
      margin: 0;
    }
    .pill {
      display: inline-block;
      font-size: 0.85rem;
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .touchpad-wrap {
      display: flex;
      justify-content: center;
      margin-top: 8px;
    }
    .touchpad {
      display: grid;
      grid-template-columns: 88px 88px 88px;
      grid-template-rows: 88px 88px;
      gap: 8px;
      align-items: center;
      justify-items: center;
      user-select: none;
      touch-action: manipulation;
    }
    .touchpad-empty {
      width: 88px;
      height: 88px;
    }
    .mobile-stats {
      display: none;
    }
    .trial-copy {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .trial-copy p {
      margin-bottom: 0;
    }
    .mobile-touchdock {
      display: contents;
    }
    .touch-btn {
      width: 88px;
      height: 88px;
      border-radius: 14px;
      border: 1px solid #cfd4db;
      background: linear-gradient(180deg, #fafafa 0%, #dfe3e8 100%);
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.95), inset 0 -2px 6px rgba(0,0,0,0.08), 0 6px 16px rgba(0,0,0,0.18);
      color: #1f2937;
      font-size: 2rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .touch-btn:active {
      transform: translateY(1px) scale(0.99);
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.12), 0 3px 8px rgba(0,0,0,0.16);
    }
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      .app { width: calc(100vw - 16px); height: calc(100vh - 16px); padding: 10px 10px calc(12px + env(safe-area-inset-bottom)); }
      .topbar { margin-bottom: 6px; align-items: center; gap: 8px; }
      .topbar h2 { font-size: 1.35rem; margin-bottom: 0; }
      .topbar .muted { font-size: 0.92rem; }
      .main-layout { gap: 6px; height: calc(100vh - 132px); }
      .intro-panel { max-height: calc(100vh - 144px); padding-right: 2px; }
      .stat { min-height: 92px; }
      .stat-value { font-size: 1.8rem; }
      .feedback-panel { min-height: 64px; padding: 10px 12px; border-radius: 16px; }
      .feedback-label { font-size: 0.92rem; margin-bottom: 4px; }
      .completed-answer-top .done-number { font-size: 3.65rem; }
      .completed-answer-top .total-number { font-size: 0.92rem; }
      .stimulus {
        width: min(100%, 100%);
        max-height: min(34vh, 280px);
        min-height: 0;
        border-radius: 20px;
      }
      .arrow { font-size: min(22vw, 6rem); }
      .mobile-stats {
        display: flex;
        gap: 6px;
        overflow-x: auto;
        padding-bottom: 2px;
        -webkit-overflow-scrolling: touch;
      }
      .mobile-stats .pill {
        white-space: nowrap;
        font-size: 0.8rem;
        padding: 4px 8px;
        color: var(--text);
        border-color: rgba(148, 163, 184, 0.25);
        background: rgba(255,255,255,0.04);
      }
      .touch-layout .grid { display: none; }
      .touch-layout .trial-copy { display: none; }
      .mobile-touchdock {
        display: block;
        position: sticky;
        bottom: 0;
        margin-top: auto;
        padding: 8px 0 calc(6px + env(safe-area-inset-bottom));
        background: linear-gradient(180deg, rgba(15, 23, 42, 0) 0%, rgba(15, 23, 42, 0.92) 18%, rgba(15, 23, 42, 1) 100%);
      }
      .touchpad-wrap { margin-top: 0; }
      .touchpad {
        width: min(100%, 338px);
        grid-template-columns: repeat(3, minmax(84px, 1fr));
        grid-template-rows: 88px 88px;
        gap: 8px;
      }
      .touch-btn,
      .touchpad-empty {
        width: 100%;
        height: 88px;
      }
      .transition-screen { height: calc(100vh - 150px); padding-top: 4px; }
      .transition-panel { min-height: calc(100vh - 210px); border-radius: 22px; padding: 24px 20px; }
      .transition-actions { justify-content: stretch; }
      .transition-actions button { width: 100%; min-width: 0; min-height: 60px; font-size: 1.1rem; }
      .stage-progress-segment { height: 10px; }
      .stage-progress-labels { font-size: 0.8rem; margin-top: 6px; }
      .stage-progress-wrap { margin-top: 2px; }
      .trial-counter {
        top: 14px;
        left: 16px;
        right: 16px;
        font-size: 1.18rem;
      }
      .stimulus-inner { padding: 14px 16px 18px; }
      .stimulus-track {
        gap: 10px;
        padding-top: 32px;
      }
      .current-arrow-wrap {
        width: min(24vw, 6.5rem);
      }
      .preview-arrows {
        gap: 6px;
      }
      .preview-arrow-item {
        width: min(11vw, 3.4rem);
      }
      .preview-arrow-item .arrow {
        font-size: min(6vw, 2.5rem);
      }
      .preview-arrow-item .preview-label {
        font-size: 0.6rem;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div id="screen"></div>
  </div>

  <script>
    const CONFIG = {
      practiceTrials: 10,
      blockTrials: 100,
      practiceDurationMs: 12000,
      blockDurationMs: 60000,
      interTrialMs: 100,
      countdownSeconds: 3,
      googleScriptUrl: 'https://script.google.com/macros/s/AKfycbxiZsPR_PRYtP09s1ASSd18FgbgayLFLlT1JePsV4knRJHoDZVPfPAK6cr5ONFOiUdB/exec',
      enableUpload: true,
      previewArrowCount: 2,
      stageUploadIntervalMs: 10000,
      stimuli: [
        { key: 'ArrowUp', symbol: '↑', correct: 'ArrowDown', type: 'vertical' },
        { key: 'ArrowDown', symbol: '↓', correct: 'ArrowUp', type: 'vertical' },
        { key: 'ArrowLeft', symbol: '←', correct: 'ArrowRight', type: 'horizontal' },
        { key: 'ArrowRight', symbol: '→', correct: 'ArrowLeft', type: 'horizontal' }
      ]
    };

    const I18N = {
      en: {
        study: 'MIE286 Study',
        title: 'Direction Matching Game',
        introLead: 'How many correct responses can you make in 60 seconds?',
        readBefore: 'Before you begin',
        bullets: [
          'In laboratory finger-tapping tests, healthy adults in their 20s and 30s average about 300 simple taps per minute with the dominant index finger. But this challenge is harder.',
          'Here, every arrow must be answered with the opposite direction. That means this is not just about speed — it is also about attention, judgment, and consistency.',
          'You will complete two 60-second rounds. The task stays the same, but the countdown is displayed differently in each round.',
          'We want to explore one question: Can the way time is shown affect how fast and how accurately you perform?',
          'How many can you finish? How accurate can you stay? This time, the record will be written by you.'
        ],
        consent: 'I agree to participate anonymously for the MIE286 course project. (Required to start)',
        soundConsent: 'Enable optional sound effects to make the task feel more interactive.',
        leaderboardConsent: 'I agree to join the optional leaderboard. Optional: if unchecked, you will not join the leaderboard and will not see leaderboard results.',
        soundHint: 'If enabled, each response uses a soft key-tap sound, and a warning beep repeats during the last 15 seconds.',
        nicknameLabel: 'Nickname (optional)',
        nicknamePlaceholder: 'Enter a nickname or leave blank',
        participantLabel: 'Participant ID (optional)',
        participantPlaceholder: 'Leave blank to auto-generate an ID',
        continue: 'Continue to Practice →',

    function setScrollMode(enabled) {
      document.documentElement.style.overflowY = enabled ? 'auto' : 'hidden';
      document.body.style.overflowY = enabled ? 'auto' : 'hidden';
      document.body.style.overflowX = 'hidden';
      const app = document.querySelector('.app');
      if (app) app.style.overflowY = enabled ? 'auto' : 'hidden';
    }

    async function initAudio() {
      if (!state.audioCtx) {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (Ctx) state.audioCtx = new Ctx({ latencyHint: 'interactive' });
      }
      if (!state.audioCtx) return false;
      if (state.audioCtx.state === 'suspended') {
        try {
          await state.audioCtx.resume();
        } catch (e) {
        }
      }
      if (!state.masterGain) {
        state.masterGain = state.audioCtx.createGain();
        state.masterGain.gain.value = 1;
        state.masterGain.connect(state.audioCtx.destination);
      }
      if (!state.audioReady) {
        const now = state.audioCtx.currentTime;
        const osc = state.audioCtx.createOscillator();
        const gain = state.audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, now);
        gain.gain.setValueAtTime(0.00001, now);
        gain.gain.exponentialRampToValueAtTime(0.00002, now + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.00001, now + 0.03);
        osc.connect(gain);
        gain.connect(state.masterGain);
        osc.start(now);
        osc.stop(now + 0.04);
        state.audioReady = true;
      }
      return true;
    }

    function playTapSound() {
      if (!state.soundEnabled || !state.audioReady || !state.audioCtx) return;
      if (state.audioCtx.state === 'suspended') return;
      const now = Math.max(state.audioCtx.currentTime + 0.001, state.lastAudioTime + 0.002);
      state.lastAudioTime = now;
      const osc1 = state.audioCtx.createOscillator();
      const osc2 = state.audioCtx.createOscillator();
      const gain = state.audioCtx.createGain();
      const filter = state.audioCtx.createBiquadFilter();
      filter.type = 'highshelf';
      filter.frequency.value = 2200;
      filter.gain.value = -4;
      osc1.type = 'triangle';
      osc2.type = 'square';
      osc1.frequency.setValueAtTime(790, now);
      osc2.frequency.setValueAtTime(1210, now);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.017, now + 0.003);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.028);
      osc1.connect(filter);
      osc2.connect(filter);
      filter.connect(gain);
      gain.connect(state.masterGain || state.audioCtx.destination);
      osc1.start(now);
      osc2.start(now);
      osc1.stop(now + 0.04);
      osc2.stop(now + 0.04);
    }

    function generateParticipantId() {
      return `P-${Math.random().toString(36).slice(2, 8).toUpperCase()}`;
    }

    function formatElapsed(ms) {
      const totalSec = Math.floor(ms / 1000);
      const min = String(Math.floor(totalSec / 60)).padStart(2, '0');
      const sec = String(totalSec % 60).padStart(2, '0');
      return `${min}:${sec}`;
    }


    function formatRemaining(ms) {
      const totalSec = Math.max(0, Math.ceil(ms / 1000));
      const min = String(Math.floor(totalSec / 60)).padStart(2, '0');
      const sec = String(totalSec % 60).padStart(2, '0');
      return `${min}:${sec}`;
    }

    function getStageDurationMs() {
      return state.inPractice ? CONFIG.practiceDurationMs : CONFIG.blockDurationMs;
    }

    function getRemainingMs() {
      if (!state.stageDeadline) return getStageDurationMs();
      return Math.max(0, state.stageDeadline - performance.now());
    }

    function getCountdownColor(remainingMs, totalMs = getStageDurationMs()) {
      const ratio = totalMs ? Math.max(0, Math.min(1, remainingMs / totalMs)) : 0;
      const hue = 120 * ratio;
      return `hsl(${hue} 82% 60%)`;
    }


    function getPracticeProgress() {
      return Math.min(1, state.trialIndex / CONFIG.practiceTrials);
    }

    function getTimedStageProgress() {
      const totalMs = getStageDurationMs();
      if (!totalMs) return 0;
      return Math.max(0, Math.min(1, 1 - (getRemainingMs() / totalMs)));
    }

    function getStageProgressMarkup() {
      const segments = [
        { key: 'practice', label: state.lang === 'zh' ? '练习' : 'Practice', weight: 1 },
        { key: 'block0', label: state.lang === 'zh' ? '试验一' : 'Trial 1', weight: 10 },
        { key: 'block1', label: state.lang === 'zh' ? '试验二' : 'Trial 2', weight: 10 }
      ];
      const timedProgress = getTimedStageProgress();
      const fillFor = (key) => {
        if (state.phase === 'complete') return 1;
        if (key === 'practice') {
          if (state.inPractice) return getPracticeProgress();
          return 1;
        }
        if (key === 'block0') {
          if (state.inPractice) return 0;
          if (state.blockIndex === 0) return timedProgress;
          if (state.blockIndex >= 1) return 1;
          return 0;
        }
        if (key === 'block1') {
          if (!state.inPractice && state.blockIndex === 1 && state.phase === 'trial') return timedProgress;
          if (state.phase === 'complete') return 1;
          return 0;
        }
        return 0;
      };
      return `
        <div class="stage-progress-wrap">
          <div class="stage-progress-track">
            ${segments.map(seg => `<div class="stage-progress-segment" style="flex:${seg.weight}"><div class="stage-progress-fill ${seg.key}" data-stage-fill="${seg.key}" style="width:${fillFor(seg.key) * 100}%"></div><div class="stage-progress-flag ${seg.key}" data-stage-flag="${seg.key}" style="left:${fillFor(seg.key) * 100}%"></div></div>`).join('')}
          </div>
          <div class="stage-progress-labels">
            ${segments.map(seg => `<div class="stage-progress-label" style="flex:${seg.weight}">${seg.label}</div>`).join('')}
          </div>
        </div>`;
    }

    function playWarningSound() {
      if (!state.soundEnabled || !state.audioReady || !state.audioCtx) return;
      if (state.audioCtx.state === 'suspended') return;
      const now = Math.max(state.audioCtx.currentTime + 0.001, state.lastAudioTime + 0.01);
      state.lastAudioTime = now + 0.2;
      [0, 0.16].forEach((offset) => {
        const osc = state.audioCtx.createOscillator();
        const gain = state.audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(1280, now + offset);
        gain.gain.setValueAtTime(0.0001, now + offset);
        gain.gain.exponentialRampToValueAtTime(0.012, now + offset + 0.008);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + offset + 0.09);
        osc.connect(gain);
        gain.connect(state.masterGain || state.audioCtx.destination);
        osc.start(now + offset);
        osc.stop(now + offset + 0.1);
      });
    }

    function launchConfetti() {
      const appEl = document.querySelector('.app');
      if (!appEl) return;
      const layer = document.createElement('div');
      layer.className = 'confetti-layer';
      const colors = ['#fb7185', '#f59e0b', '#facc15', '#4ade80', '#60a5fa', '#c084fc'];
      const pieceCount = 28;
      for (let i = 0; i < pieceCount; i += 1) {
        const piece = document.createElement('span');
        piece.className = 'confetti-piece';
        const left = 10 + Math.random() * 80;
        const drift = -90 + Math.random() * 180;
        const drop = 160 + Math.random() * 220;
        const spin = -540 + Math.random() * 1080;
        const delay = Math.random() * 180;
        piece.style.left = `${left}%`;
        piece.style.background = colors[i % colors.length];
        piece.style.setProperty('--drift-x', `${drift}px`);
        piece.style.setProperty('--drop-y', `${drop}px`);
        piece.style.setProperty('--spin', `${spin}deg`);
        piece.style.animationDelay = `${delay}ms`;
        piece.style.width = `${8 + Math.random() * 6}px`;
        piece.style.height = `${12 + Math.random() * 8}px`;
        layer.appendChild(piece);
      }
      appEl.appendChild(layer);
      window.setTimeout(() => layer.remove(), 1700);
    }

    function cacheLiveTimerUI() {
      state.liveTimerEls = {
        timerNumber: document.getElementById('timerNumber'),
        timerFill: document.getElementById('timerFill'),
        elapsedValue: document.getElementById('elapsedValue'),
        stageFills: {
          practice: document.querySelector('[data-stage-fill="practice"]'),
          block0: document.querySelector('[data-stage-fill="block0"]'),
          block1: document.querySelector('[data-stage-fill="block1"]')
        },
        stageFlags: {
          practice: document.querySelector('[data-stage-flag="practice"]'),
          block0: document.querySelector('[data-stage-flag="block0"]'),
          block1: document.querySelector('[data-stage-flag="block1"]')
        }
      };
    }

    function updateStageProgressUI() {
      if (!state.liveTimerEls || !state.liveTimerEls.stageFills) return;
      const fills = state.liveTimerEls.stageFills;
      const practiceWidth = state.phase === 'complete' ? 100 : (state.inPractice ? getPracticeProgress() * 100 : 100);
      let block0Width = 0;
      let block1Width = 0;
      if (state.phase === 'complete') {
        block0Width = 100;
        block1Width = 100;
      } else if (!state.inPractice) {
        if (state.blockIndex === 0) {
          block0Width = getTimedStageProgress() * 100;
        } else if (state.blockIndex >= 1) {
          block0Width = 100;
          if (state.phase === 'trial') block1Width = getTimedStageProgress() * 100;
        }
      }
      if (fills.practice) fills.practice.style.width = `${practiceWidth}%`;
      if (fills.block0) fills.block0.style.width = `${block0Width}%`;
      if (fills.block1) fills.block1.style.width = `${block1Width}%`;
    }

    function stopStageTimer() {
      if (state.timerInterval) {
        clearInterval(state.timerInterval);
        state.timerInterval = null;
      }
      state.lastRenderedSecond = null;
      state.nextStageUploadAt = null;
    }

    function updateLiveTimerUI(force = false) {
      if (state.phase !== 'trial') return;
      const totalMs = getStageDurationMs();
      const remainingMs = getRemainingMs();
      const remainingText = formatRemaining(remainingMs);
      const countdownColor = getCountdownColor(remainingMs, totalMs);
      const progressPct = totalMs ? Math.max(0, (remainingMs / totalMs) * 100) : 0;
      const remainingSec = Math.max(0, Math.ceil(remainingMs / 1000));
      const refs = state.liveTimerEls || {};
      if (refs.timerFill) {
        refs.timerFill.style.width = `${progressPct}%`;
        refs.timerFill.style.background = `linear-gradient(90deg, #22c55e 0%, ${countdownColor} 100%)`;
      }
      if (refs.elapsedValue) {
        refs.elapsedValue.textContent = formatElapsed(getElapsedMsForCurrentBlock());
      }
      updateStageProgressUI();
      if (!force && state.lastRenderedSecond === remainingSec) return;
      state.lastRenderedSecond = remainingSec;
      if (refs.timerNumber) {
        refs.timerNumber.textContent = remainingText;
        refs.timerNumber.style.color = countdownColor;
      }
    }

    function startStageTimer() {
      stopStageTimer();
      state.stageDeadline = performance.now() + getStageDurationMs();
      state.warningSecondPlayed = null;
      state.blockEnding = false;
      state.lastRenderedSecond = null;
      state.nextStageUploadAt = performance.now() + CONFIG.stageUploadIntervalMs;
      state.timerInterval = setInterval(() => {
        if (state.phase !== 'trial' || state.blockEnding) return;
        const remainingMs = getRemainingMs();
        const remainingSec = Math.max(0, Math.ceil(remainingMs / 1000));
        if (!state.inPractice && remainingSec <= 15 && remainingSec > 0 && state.warningSecondPlayed !== remainingSec) {
          state.warningSecondPlayed = remainingSec;
          playWarningSound();
        }
        if (performance.now() >= state.nextStageUploadAt) {
          const activeStageKey = state.inPractice ? 'practice' : state.blockIndex;
          queueStageUpload(activeStageKey);
          state.nextStageUploadAt += CONFIG.stageUploadIntervalMs;
        }
        updateLiveTimerUI();
        if (remainingMs <= 0) {
          state.waitingForResponse = false;
          endBlock();
        }
      }, 50);
    }

    function getElapsedMsForCurrentBlock() {
      return state.blockStartTime ? performance.now() - state.blockStartTime : 0;
    }

    function chooseStimulusFromHistory(history) {
      const recent = history.slice(-2);
      const candidates = CONFIG.stimuli.filter((stim) => {
        if (recent.length === 2 && recent[0] === stim.symbol && recent[1] === stim.symbol) {
          return false;
        }
        if (recent.length >= 2) {
          const recentTypes = recent.map(sym => CONFIG.stimuli.find(s => s.symbol === sym)?.type || 'unknown');
          if (recentTypes[0] === recentTypes[1] && stim.type === recentTypes[0]) {
            return false;
          }
        }
        return true;
      });
      return candidates[Math.floor(Math.random() * candidates.length)];
    }

    function rememberStimulus(stimulus) {
      state.lastStimuli.push(stimulus.symbol);
      if (state.lastStimuli.length > 2) state.lastStimuli = state.lastStimuli.slice(-2);
    }

    function ensureUpcomingStimuli(minCount) {
      let simulatedHistory = state.lastStimuli.concat(state.upcomingStimuli.map((stim) => stim.symbol));
      while (state.upcomingStimuli.length < minCount) {
        const next = chooseStimulusFromHistory(simulatedHistory);
        state.upcomingStimuli.push(next);
        simulatedHistory.push(next.symbol);
        if (simulatedHistory.length > 2) simulatedHistory = simulatedHistory.slice(-2);
      }
    }

    function takeNextStimulus() {
      ensureUpcomingStimuli(CONFIG.previewArrowCount + 1);
      const next = state.upcomingStimuli.shift();
      rememberStimulus(next);
      ensureUpcomingStimuli(CONFIG.previewArrowCount);
      return next;
    }

    function headerControls() {
      return `<div class="row language-switch"><button class="ghost" id="langToggle">${t('language')}</button></div>`;
    }

    function attachLangToggle() {
      const btn = document.getElementById('langToggle');
      if (!btn) return;
      btn.addEventListener('click', () => {
        state.lang = state.lang === 'en' ? 'zh' : 'en';
        if (state.phase === 'countdown') return;
        rerender();
      });
    }

    function rerender() {
      switch (state.phase) {
        case 'intro': renderIntro(); break;
        case 'practiceIntro': renderPracticeIntro(); break;
        case 'between': renderBetween(); break;
        case 'trial': renderTrial(); break;
        case 'complete': renderComplete(); break;
        case 'countdown': break;
        default: renderIntro();
      }
    }

    function renderIntro() {
      setScrollMode(true);
      state.phase = 'intro';
      screen.innerHTML = `
        <div class="topbar">
          <div>
            <p class="muted">${t('study')}</p>
            <h1>${t('title')}</h1>
            <p>${t('introLead')}</p>
            <span class="pill">${t('device')}: ${state.deviceType}</span>
            <span class="pill">${t('input')}: ${state.inputMode}</span>
          </div>
          ${headerControls()}
        </div>
        <div class="card intro-panel">
          <h2>${t('readBefore')}</h2>
          <ul>${I18N[state.lang].bullets.map((x) => `<li>${x}</li>`).join('')}</ul>
          <div class="row" style="margin-top:14px;">
            <div>
              <label class="muted">${t('nicknameLabel')}</label><br />
              <input id="nicknameInput" type="text" placeholder="${t('nicknamePlaceholder')}" value="${state.nickname}" />
            </div>
            <div>
              <label class="muted">${t('participantLabel')}</label><br />
              <input id="pidInput" type="text" placeholder="${t('participantPlaceholder')}" value="${state.participantId}" />
            </div>
          </div>
          <label class="row" style="margin-top:14px; align-items:flex-start;">
            <input id="consent" type="checkbox" />
            <span>${t('consent')}</span>
          </label>
          <label class="row" style="margin-top:10px; align-items:flex-start;">
            <input id="leaderboardConsent" type="checkbox" ${state.joinLeaderboard ? 'checked' : ''} />
            <span>${t('leaderboardConsent')}</span>
          </label>
          <label class="row" style="margin-top:10px; align-items:flex-start;">
            <input id="soundConsent" type="checkbox" ${state.soundEnabled ? 'checked' : ''} />
            <span>${t('soundConsent')}</span>
          </label>
          <p class="muted" style="margin-top:8px;">${t('soundHint')}</p>
          <div class="row" style="margin-top:18px;">
            <button id="continueBtn" disabled>${t('continue')}</button>
          </div>
        </div>
      `;
      attachLangToggle();
      const consent = document.getElementById('consent');
      const lb = document.getElementById('leaderboardConsent');
      const btn = document.getElementById('continueBtn');
      const pidInput = document.getElementById('pidInput');
      const nicknameInput = document.getElementById('nicknameInput');
      const soundConsent = document.getElementById('soundConsent');
      const validate = () => { btn.disabled = !consent.checked; };
      consent.addEventListener('change', validate);
      lb.addEventListener('change', () => { state.joinLeaderboard = lb.checked; });
      validate();
      soundConsent.addEventListener('change', async () => {
        state.soundEnabled = soundConsent.checked;
        if (state.soundEnabled) await initAudio();
      });
      btn.addEventListener('click', async () => {
        state.nickname = nicknameInput.value.trim();
        state.participantId = pidInput.value.trim() || generateParticipantId();
        state.joinLeaderboard = lb.checked;
        state.soundEnabled = soundConsent.checked;
        if (state.soundEnabled) await initAudio();
        state.phase = 'practiceIntro';
        renderPracticeIntro();
      });
    }

    function renderPracticeIntro() {
      setScrollMode(false);
      state.phase = 'practiceIntro';
      screen.innerHTML = `
        <div class="topbar">
          <div>
            <p class="muted">${t('warmup')}</p>
          </div>
          ${headerControls()}
        </div>
        <div class="transition-screen">
          <div class="transition-panel">
            <div class="transition-copy">
              <p class="transition-kicker">${t('practiceRound')}</p>
              <h2 class="transition-title">${t('practiceFirst')}</h2>
              <p class="transition-lead">${t('practiceDesc')}</p>
            </div>
            <div class="transition-info">
              <p><strong>${t('rule')}</strong> ${t('ruleText')}</p>
              <p class="muted" style="margin-top:12px;">${t('cogLoad')}</p>
            </div>
            <div class="transition-actions">
              <button id="startPractice">${t('startPractice')}</button>
            </div>
          </div>
        </div>
      `;
      attachLangToggle();
      document.getElementById('startPractice').addEventListener('click', () => startBlock(true));
    }

    function startBlock(isPractice) {
      state.inPractice = isPractice;
      state.trialIndex = 0;
      state.feedbackMode = isPractice ? 'practice' : state.conditionOrder[state.blockIndex];
      state.blockStartTime = null;
      state.lastStimuli = [];
      state.upcomingStimuli = [];
      state.currentStimulus = null;
      state.bufferedResponse = null;
      state.phase = 'countdown';
      countdownThen(() => {
        state.blockStartTime = performance.now();
        startStageTimer();
        nextTrial();
      });
    }

    function countdownThen(cb) {
      setScrollMode(false);
      let count = CONFIG.countdownSeconds;
      screen.innerHTML = `
        <div class="topbar">
          <div>
            <p class="muted">${state.inPractice ? t('practiceRound') : `${t('block')} ${state.blockIndex + 1} ${t('of')} 2`}</p>
            <h2>${t('getReady')}</h2>
          </div>
          ${headerControls()}
        </div>
        <div class="fullscreen-flow">
          <div class="stimulus"><div class="arrow" id="countdown">${count}</div></div>
        </div>
      `;
      attachLangToggle();
      const el = document.getElementById('countdown');
      const interval = setInterval(() => {
        count -= 1;
        if (count <= 0) {
          clearInterval(interval);
          cb();
        } else {
          el.textContent = count;
        }
      }, 800);
    }

    function nextTrial() {
      const totalTrials = state.inPractice ? CONFIG.practiceTrials : Number.POSITIVE_INFINITY;
      if (state.trialIndex >= totalTrials || getRemainingMs() <= 0) {
        endBlock();
        return;
      }
      state.phase = 'trial';
      state.currentStimulus = takeNextStimulus();
      state.trialStart = performance.now();
      state.waitingForResponse = true;
      renderTrial();
      if (state.bufferedResponse) {
        const buffered = state.bufferedResponse;
        state.bufferedResponse = null;
        if (performance.now() - buffered.at <= 200) {
          handleResponse(buffered.key, buffered.at);
        }
      }
    }

    function renderTrial() {
      setScrollMode(false);
      const displayMode = state.inPractice ? 'numeric' : state.feedbackMode;
      const totalMs = getStageDurationMs();
      const remainingMs = getRemainingMs();
      const remainingText = formatRemaining(remainingMs);
      const countdownColor = getCountdownColor(remainingMs, totalMs);
      const progressPct = totalMs ? Math.max(0, (remainingMs / totalMs) * 100) : 0;
      const blockRows = state.results.filter((r) => r.participantId === state.participantId && r.condition === state.feedbackMode && !r.practice);
      const answered = blockRows.length;
      const correct = blockRows.filter((r) => r.correct).length;
      const acc = answered ? `${Math.round((correct / answered) * 100)}%` : '—';
      const meanRT = correct ? `${Math.round(blockRows.filter((r) => r.correct).reduce((sum, r) => sum + r.rtMs, 0) / correct)} ms` : '—';
      const elapsed = formatElapsed(getElapsedMsForCurrentBlock());
      const completedCount = state.trialIndex;
      const countLabel = state.inPractice
        ? (state.lang === 'zh' ? `第 ${Math.min(state.trialIndex + 1, CONFIG.practiceTrials)} / ${CONFIG.practiceTrials} 题` : `Trial ${Math.min(state.trialIndex + 1, CONFIG.practiceTrials)} / ${CONFIG.practiceTrials}`)
        : (state.lang === 'zh' ? `已完成 ${completedCount} 题` : `${completedCount} completed`);

      const timerDisplay = displayMode === 'numeric'
        ? `<div class="completed-answer-top" data-countdown-shell><div class="done-number" id="timerNumber" style="color:${countdownColor}">${remainingText}</div><div class="total-number">${t('numericDisplay')}</div></div>`
        : `<div class="feedback-panel" data-countdown-shell><div class="feedback-label">${state.lang === 'zh' ? '剩余时间' : 'Time Remaining'}</div><div class="progress-shell"><div class="progress-fill" id="timerFill" style="width:${progressPct}%; background: linear-gradient(90deg, #22c55e 0%, ${countdownColor} 100%);"></div></div></div>`;

      const statsSection = state.inputMode === 'touch'
        ? `<div class="mobile-stats"><span class="pill">${t('accuracy')}: ${acc}</span><span class="pill">${t('meanRT')}: ${meanRT}</span><span class="pill">${t('elapsed')}: <span id="elapsedValue">${elapsed}</span></span></div>`
        : `<div class="grid"><div class="stat"><div class="stat-label">${t('accuracy')}</div><div class="stat-value">${acc}</div></div><div class="stat"><div class="stat-label">${t('meanRT')}</div><div class="stat-value">${meanRT}</div></div><div class="stat"><div class="stat-label">${t('elapsed')}</div><div class="stat-value" id="elapsedValue">${elapsed}</div></div></div>`;

      const instructionHtml = state.inputMode === 'touch'
        ? `<div class="trial-copy"><p class="muted">${t('touchHint')}</p></div>`
        : `<div class="trial-copy"><p style="font-size: 1.4rem; font-weight: 800; color: #fbbf24; text-shadow: 0 0 16px rgba(251, 191, 36, 0.25); letter-spacing: 0.03em; line-height: 1.5; text-align: center;">${t('pressOpposite')}</p></div>`;

      const touchControls = state.inputMode === 'touch' ? `
            <div class="mobile-touchdock">
              <div class="touchpad-wrap">
                <div class="touchpad">
                  <div class="touchpad-empty"></div>
                  <button class="touch-btn" data-key="ArrowUp" aria-label="Up">↑</button>
                  <div class="touchpad-empty"></div>
                  <button class="touch-btn" data-key="ArrowLeft" aria-label="Left">←</button>
                  <button class="touch-btn" data-key="ArrowDown" aria-label="Down">↓</button>
                  <button class="touch-btn" data-key="ArrowRight" aria-label="Right">→</button>
                </div>
              </div>
            </div>
          ` : '';

      screen.innerHTML = `
        <div class="topbar">
          <div>
            <p class="muted">${state.inPractice ? t('practiceRound') : `${t('feedback')}: ${displayMode === 'numeric' ? t('numeric') : t('bar')}`}</p>
            <h2>${state.inPractice ? t('practiceRound') : `${t('block')} ${state.blockIndex + 1} ${t('of')} 2`}</h2>
          </div>
          ${headerControls()}
        </div>
        <div class="main-layout ${state.inputMode === 'touch' ? 'touch-layout' : ''}">
          ${statsSection}
          ${timerDisplay}
          <div class="stimulus"><div class="stimulus-inner"><div class="trial-counter">${countLabel}</div><div class="stimulus-track"><div class="current-arrow-wrap"><div class="arrow thick-arrow">${state.currentStimulus.symbol}</div></div>${state.upcomingStimuli.length > 0 ? `<div class="preview-arrows">${state.upcomingStimuli.map((stim, idx) => `<div class="preview-arrow-item"><div class="arrow">${stim.symbol}</div><div class="preview-label">${state.lang === 'zh' ? `后${idx + 1}` : `Next${idx + 1}`}</div></div>`).join('')}</div>` : ''}</div></div></div>
          ${instructionHtml}
          ${getStageProgressMarkup()}
          ${touchControls}
        </div>
      `;
      attachLangToggle();
      cacheLiveTimerUI();
      updateLiveTimerUI(true);
      if (state.inputMode === 'touch') {
        document.querySelectorAll('.touch-btn').forEach((btn) => {
          const press = (e) => {
            e.preventDefault();
            handleResponse(btn.dataset.key);
          };
          btn.addEventListener('click', press);
          btn.addEventListener('touchstart', press, { passive: false });
        });
      }
    }

    function handleResponse(keyValue, inputTimestamp = performance.now()) {
      if (!state.waitingForResponse) return;
      if (!['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(keyValue)) return;
      const rt = Math.max(0, Math.round(inputTimestamp - state.trialStart));
      const correct = keyValue === state.currentStimulus.correct;
      playTapSound();
      state.results.push({
        participantId: state.participantId,
        nickname: state.nickname,
        sessionId: state.sessionId,
        deviceType: state.deviceType,
        inputMode: state.inputMode,
        soundEnabled: state.soundEnabled,
        joinLeaderboard: state.joinLeaderboard,
        condition: state.feedbackMode,
        blockIndex: state.inPractice ? -1 : state.blockIndex,
        practice: state.inPractice,
        trial: state.trialIndex + 1,
        stimulus: state.currentStimulus.symbol,
        correctKey: state.currentStimulus.correct,
        responseKey: keyValue,
        correct,
        rtMs: rt,
        elapsedMsInBlock: Math.round(getElapsedMsForCurrentBlock()),
        timestamp: new Date().toISOString()
      });
      state.waitingForResponse = false;
      state.trialIndex += 1;
      setTimeout(nextTrial, CONFIG.interTrialMs);
    }

    function isEditableTarget(target) {
      if (!target) return false;
      const tagName = (target.tagName || '').toLowerCase();
      return tagName === 'input' || tagName === 'textarea' || target.isContentEditable;
    }

    function handleKey(event) {
      if (isEditableTarget(event.target)) return;
      const isArrowKey = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(event.key);
      if (state.phase !== 'complete' && [...(isArrowKey ? [event.key] : []), ' '].includes(event.key)) {
        event.preventDefault();
      }
      if (state.inputMode === 'touch') return;
      if (event.repeat) return;
      if (!state.waitingForResponse && state.phase === 'trial' && isArrowKey) {
        state.bufferedResponse = { key: event.key, at: performance.now() };
        return;
      }
      handleResponse(event.key, performance.now());
    }

    async function endBlock() {
      if (state.blockEnding) return;
      state.blockEnding = true;
      stopStageTimer();
      if (state.inPractice) {
        queueStageUpload('practice');
        state.betweenAfterPractice = true;
        state.phase = 'between';
        renderBetween();
        launchConfetti();
        return;
      }
      if (state.blockIndex === 0) {
        queueStageUpload(state.blockIndex);
        state.blockIndex = 1;
        state.betweenAfterPractice = false;
        state.phase = 'between';
        renderBetween();
        launchConfetti();
      } else {
        queueStageUpload(state.blockIndex);
        state.phase = 'complete';
        state.uploadStatus = 'uploading';
        state.leaderboardLoading = state.joinLeaderboard;
        renderComplete();
        launchConfetti();
        finalizeSessionUploads().catch(() => {
          state.uploadStatus = 'fail';
          state.leaderboardLoading = false;
          if (state.phase === 'complete') renderComplete();
        });
      }
    }

    function renderBetween(afterPractice = state.betweenAfterPractice) {
      setScrollMode(false);
      state.phase = 'between';
      state.betweenAfterPractice = afterPractice;
      const message = afterPractice ? t('practiceComplete') : t('block1Complete');
      const orderText = `${state.conditionOrder[0] === 'numeric' ? t('numeric') : t('bar')} → ${state.conditionOrder[1] === 'numeric' ? t('numeric') : t('bar')}`;
      screen.innerHTML = `
        <div class="topbar">
          <div>
            <p class="muted">${afterPractice ? t('practiceRound') : `${t('block')} ${state.blockIndex} ${t('of')} 2`}</p>
          </div>
          ${headerControls()}
        </div>
        <div class="transition-screen">
          <div class="transition-panel">
            <div class="transition-copy">
              <p class="transition-kicker">${afterPractice ? t('practiceRound') : `${t('block')} ${state.blockIndex} ${t('of')} 2`}</p>
              <h2 class="transition-title">${message}</h2>
            </div>
            <div class="transition-info">
              <p>${t('orderText')} <strong>${orderText}</strong>.</p>
            </div>
            <div class="transition-actions">
              <button id="nextBtn">${afterPractice ? t('startBlock1') : t('startBlock2')}</button>
            </div>
          </div>
        </div>
      `;
      attachLangToggle();
      document.getElementById('nextBtn').addEventListener('click', () => startBlock(false));
    }

    function summarizeCondition(condition) {
      const rows = state.results.filter((r) => !r.practice && r.participantId === state.participantId && r.condition === condition);
      const correctRows = rows.filter((r) => r.correct);
      const meanRT = correctRows.length ? Math.round(correctRows.reduce((a, b) => a + b.rtMs, 0) / correctRows.length) : 0;
      const accuracy = rows.length ? correctRows.length / rows.length : 0;
      const score = rows.length ? Number((rows.length * accuracy * accuracy).toFixed(2)) : 0;
      return { meanRT, accuracy, attempted: rows.length, score };
    }

    function getParticipantTrialRows() {
      return state.results.filter((r) => r.participantId === state.participantId && r.sessionId === state.sessionId);
    }

    function getStageUploadKey(stageKey) {
      return stageKey === 'practice' ? 'practice' : `block${stageKey}`;
    }

    function getStageRows(stageKey) {
      if (stageKey === 'practice') {
        return getParticipantTrialRows().filter((r) => r.practice);
      }
      return getParticipantTrialRows().filter((r) => !r.practice && Number(r.blockIndex) === Number(stageKey));
    }

    function getPendingStageRows(stageKey) {
      const uploadKey = getStageUploadKey(stageKey);
      const rows = getStageRows(stageKey);
      return rows.slice(state.stageUploadMarkers[uploadKey] || 0);
    }

    function markStageUploaded(stageKey, uploadedThrough = null) {
      const uploadKey = getStageUploadKey(stageKey);
      const currentLength = getStageRows(stageKey).length;
      const safeThrough = uploadedThrough == null ? currentLength : Math.min(uploadedThrough, currentLength);
      state.stageUploadMarkers[uploadKey] = Math.max(state.stageUploadMarkers[uploadKey] || 0, safeThrough);
      state.uploadedTrialCount = Object.values(state.stageUploadMarkers).reduce((sum, count) => sum + Number(count || 0), 0);
    }

    async function uploadStageWithRetry(stageKey, maxAttempts = 2) {
      let lastOk = false;
      for (let attempt = 1; attempt <= maxAttempts; attempt += 1) {
        lastOk = await uploadParticipantResults(true, stageKey, { attempt });
        if (lastOk) return true;
        await new Promise((resolve) => setTimeout(resolve, 300 * attempt));
      }
      return false;
    }

    async function flushStageIfNeeded(stageKey, maxAttempts = 3) {
      const stageRows = getStageRows(stageKey);
      if (!stageRows.length) return true;
      if (!getPendingStageRows(stageKey).length) return true;
      let lastOk = false;
      for (let attempt = 1; attempt <= maxAttempts; attempt += 1) {
        if (!getPendingStageRows(stageKey).length) return true;
        lastOk = await uploadParticipantResults(true, stageKey, { attempt, flush: true });
        if (lastOk && !getPendingStageRows(stageKey).length) return true;
        await new Promise((resolve) => setTimeout(resolve, 350 * attempt));
      }
      return !getPendingStageRows(stageKey).length && lastOk;
    }

    function queueStageUpload(stageKey) {
      state.uploadQueue = state.uploadQueue
        .catch(() => null)
        .then(() => uploadStageWithRetry(stageKey));
      return state.uploadQueue;
    }

    async function finalizeSessionUploads() {
      if (state.finalizingUploads) return false;
      state.finalizingUploads = true;
      try {
        await state.uploadQueue.catch(() => null);
        const stageKeys = ['practice', 0, 1];
        for (const stageKey of stageKeys) {
          if (!getStageRows(stageKey).length) continue;
          const ok = await flushStageIfNeeded(stageKey, 3);
          if (!ok) {
            state.uploadStatus = 'fail';
            state.leaderboardLoading = false;
            if (state.phase === 'complete') renderComplete();
            return false;
          }
        }
        return await uploadParticipantResults(false, null, { summaryOnly: true });
      } finally {
        state.finalizingUploads = false;
      }
    }

    function buildUploadPayload(isPartial, trialData) {
      const numericSummary = summarizeCondition('numeric');
      const barSummary = summarizeCondition('bar');
      return {
        participantId: state.participantId,
        nickname: state.nickname,
        sessionId: state.sessionId,
        deviceType: state.deviceType,
        inputMode: state.inputMode,
        soundEnabled: state.soundEnabled,
        joinLeaderboard: state.joinLeaderboard,
        order: state.conditionOrder.join('->'),
        practiceTrials: CONFIG.practiceTrials,
        blockTrials: CONFIG.blockTrials,
        partialSave: isPartial,
        uploadMode: 'chunk',
        totalTrialCount: getParticipantTrialRows().length,
        numericSummary,
        barSummary,
        finalScore: Math.max(numericSummary.score, barSummary.score),
        trialData
      };
    }

    async function fetchLeaderboard() {
      if (!CONFIG.enableUpload || !CONFIG.googleScriptUrl) return;
      state.leaderboardLoading = true;
      if (state.phase === 'complete') renderComplete();
      try {
        const res = await fetch(`${CONFIG.googleScriptUrl}?mode=leaderboard`);
        if (!res.ok) return;
        const data = await res.json();
        state.leaderboard = Array.isArray(data.entries) ? data.entries : [];
      } catch (e) {
      } finally {
        state.leaderboardLoading = false;
        if (state.phase === 'complete') renderComplete();
      }
    }

    async function uploadParticipantResults(isPartial = false, stageKey = null, options = {}) {
      if (!CONFIG.enableUpload || !CONFIG.googleScriptUrl) {
        state.uploadStatus = 'not_connected';
        if (state.phase === 'complete') renderComplete();
        return true;
      }

      const summaryOnly = !!options.summaryOnly;
      const uploadKey = !summaryOnly && stageKey !== null ? getStageUploadKey(stageKey) : null;
      const stageRows = summaryOnly
        ? []
        : (stageKey === null ? getParticipantTrialRows() : getPendingStageRows(stageKey));
      const uploadedThrough = uploadKey
        ? (state.stageUploadMarkers[uploadKey] || 0) + stageRows.length
        : getParticipantTrialRows().length;

      if (!summaryOnly && !stageRows.length) {
        if (!isPartial && state.phase === 'complete') renderComplete();
        return true;
      }

      let uploadOk = false;
      try {
        const payload = buildUploadPayload(isPartial, stageRows);
        const res = await fetch(CONFIG.googleScriptUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(payload)
        });
        const data = await res.json().catch(() => null);
        uploadOk = res.ok && data && data.status === 'ok';
      } catch (e) {
        uploadOk = false;
      }

      if (uploadOk) {
        if (!summaryOnly && stageKey !== null) {
          markStageUploaded(stageKey, uploadedThrough);
        } else if (!summaryOnly) {
          state.uploadedTrialCount = getParticipantTrialRows().length;
        }
        if (!isPartial) state.uploadStatus = 'success';
      } else {
        if (!isPartial) state.uploadStatus = 'fail';
      }

      if (!isPartial && state.uploadStatus === 'success') await fetchLeaderboard();
      if (!isPartial && state.phase === 'complete') renderComplete();
      return uploadOk;
    }

    function uploadMessage() {
      if (state.uploadStatus === 'uploading') return `<span class="warning upload-emphasis">${t('uploadStatusUploading')}</span>`;
      if (state.uploadStatus === 'success') {
        if (state.joinLeaderboard && state.leaderboardLoading) {
          return `<span class="warning">${t('uploadStatusLeaderboard')}</span>`;
        }
        return `<span class="success">${t('uploadStatusSuccess')}</span>`;
      }
      if (state.uploadStatus === 'fail') return `<span class="warning">${t('uploadStatusFail')}</span>`;
      if (state.uploadStatus === 'not_connected') return `<span class="muted">${t('uploadStatusReady')}</span>`;
      return '';
    }

    function leaderboardHtml() {
      if (!state.joinLeaderboard) return '';
      const rows = Array.isArray(state.leaderboard) ? state.leaderboard : [];
      if (state.uploadStatus === 'uploading') {
        return `
          <div class="card leaderboard-panel">
            <h3>${t('leaderboardTitle')}</h3>
            <p class="muted">${t('leaderboardDesc')}</p>
            <p class="warning upload-emphasis">${t('uploadStatusUploading')}</p>
            <p class="muted">${t('leaderboardLoading')}</p>
            <p class="leaderboard-rule"><strong>${t('leaderboardRuleTitle')}:</strong> ${t('leaderboardRule')}</p>
          </div>`;
      }
      if (state.leaderboardLoading) {
        return `
          <div class="card leaderboard-panel">
            <h3>${t('leaderboardTitle')}</h3>
            <p class="muted">${t('leaderboardDesc')}</p>
            <p class="muted">${t('leaderboardLoading')}</p>
            <p class="leaderboard-rule"><strong>${t('leaderboardRuleTitle')}:</strong> ${t('leaderboardRule')}</p>
          </div>`;
      }
      if (!rows.length) {
        return `
          <div class="card leaderboard-panel">
            <h3>${t('leaderboardTitle')}</h3>
            <p class="muted">${t('leaderboardDesc')}</p>
            <p class="muted">${t('noLeaderboard')}</p>
            <p class="leaderboard-rule"><strong>${t('leaderboardRuleTitle')}:</strong> ${t('leaderboardRule')}</p>
          </div>`;
      }

      const ranked = rows.map((row, idx) => ({
        ...row,
        rank: idx + 1,
        isCurrent: row.participantId === state.participantId
      }));
      const topFive = ranked.slice(0, 5);
      const current = ranked.find((row) => row.isCurrent);
      let displayRows = [...topFive];
      if (current && current.rank > 5) {
        displayRows.push({ type: 'ellipsis' }, current);
      }

      const crownForRank = (rank) => {
        if (rank === 1) return '<span class="crown gold">♛</span>';
        if (rank === 2) return '<span class="crown silver">♛</span>';
        if (rank === 3) return '<span class="crown bronze">♛</span>';
        return '';
      };

      return `
        <div class="card leaderboard-panel">
          <h3>${t('leaderboardTitle')}</h3>
          <p class="muted">${t('leaderboardDesc')}</p>
          <table class="leaderboard-table">
            <thead>
              <tr>
                <th>${t('rank')}</th>
                <th>${t('name')}</th>
                <th>${t('score')}</th>
                <th>${t('accShort')}</th>
                <th>${t('rtShort')}</th>
              </tr>
            </thead>
            <tbody>
              ${displayRows.map((row) => {
                if (row.type === 'ellipsis') {
                  return `<tr class="leaderboard-ellipsis"><td colspan="5">...</td></tr>`;
                }
                return `
                  <tr class="${row.isCurrent ? 'current-row' : ''}">
                    <td class="leaderboard-rank-cell"><span class="rank-badge">${crownForRank(row.rank)}<span>${row.rank}</span></span></td>
                    <td>${row.nickname || row.participantId || 'Anonymous'}${row.isCurrent ? `<span class="leaderboard-self-tag">${t('leaderboardCurrent')}</span>` : ''}</td>
                    <td>${row.score}</td>
                    <td>${Math.round((row.accuracy || 0) * 100)}%</td>
                    <td>${row.meanRT || 0} ms</td>
                  </tr>`;
              }).join('')}
            </tbody>
          </table>
          <p class="leaderboard-rule"><strong>${t('leaderboardRuleTitle')}:</strong> ${t('leaderboardRule')}</p>
        </div>`;
    }


    function renderComplete() {
      setScrollMode(true);
      const numeric = summarizeCondition('numeric');
      const bar = summarizeCondition('bar');
      screen.innerHTML = `
        <div class="topbar">
          <div>
            <p class="muted">${t('complete')}</p>
            <h2>${t('thankYou')}</h2>
          </div>
          ${headerControls()}
        </div>
        <div class="card">
          <p>${t('yourResults')}</p>
          <div class="grid">
            <div class="stat"><div class="stat-label">${t('numeric')} ${t('meanRT')}</div><div class="stat-value">${numeric.meanRT} ms</div></div>
            <div class="stat"><div class="stat-label">${t('numeric')} ${t('accuracy')}</div><div class="stat-value">${Math.round(numeric.accuracy * 100)}%</div></div>
            <div class="stat"><div class="stat-label">${t('bar')} ${t('meanRT')}</div><div class="stat-value">${bar.meanRT} ms</div></div>
            <div class="stat"><div class="stat-label">${t('bar')} ${t('accuracy')}</div><div class="stat-value">${Math.round(bar.accuracy * 100)}%</div></div>
          </div>
          <div class="card">
            <p><strong>${t('participantLabel')}:</strong> ${state.participantId}</p>
            <p><strong>${t('nicknameLabel')}:</strong> ${state.nickname || '—'}</p>
            <p><strong>${t('device')}:</strong> ${state.deviceType}</p>
            <p><strong>${t('input')}:</strong> ${state.inputMode}</p>
            <p><strong>Sound:</strong> ${state.soundEnabled ? 'on' : 'off'}</p>
            ${state.uploadStatus !== 'idle' ? `<p><strong>${t('uploaded')}:</strong> ${uploadMessage()}</p>` : ''}
            <p class="muted">${t('noOthers')}</p>
          </div>
          ${leaderboardHtml()}
          ${getStageProgressMarkup()}
          <div class="row" style="margin-top:18px;">
            <button class="secondary" id="restartBtn">${t('restart')}</button>
          </div>
        </div>
      `;
      attachLangToggle();
      document.getElementById('restartBtn').addEventListener('click', () => location.reload());
    }

    window.addEventListener('keydown', handleKey);
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden && state.soundEnabled) initAudio();
    });

    window.addEventListener('focus', () => {
      if (state.soundEnabled) initAudio();
    });

    window.addEventListener('beforeunload', () => {
      if (CONFIG.enableUpload && CONFIG.googleScriptUrl && state.results.length > 0) {
        const pendingRows = [
          ...getPendingStageRows('practice'),
          ...getPendingStageRows(0),
          ...getPendingStageRows(1)
        ];
        if (!pendingRows.length) return;
        const payload = buildUploadPayload(true, pendingRows);
        navigator.sendBeacon(
          CONFIG.googleScriptUrl,
          new Blob([JSON.stringify(payload)], { type: 'text/plain;charset=utf-8' })
        );
      }
    });

    renderIntro();
  </script>
</body>
</html>
